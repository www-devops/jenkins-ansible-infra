---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: true

- name: Upgrade system packages
  apt:
    upgrade: dist
  become: true

- name: Install base packages
  apt:
    name:
      - curl
      - wget
      - git
      - vim
      - unzip
      - ca-certificates
      - gnupg
      - lsb-release
    state: present
  become: true
  